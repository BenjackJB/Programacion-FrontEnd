<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebApp - Formulario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Inicio - BenjackJB (DataTables)</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Listado</a></li>
          <li class="nav-item"><a class="nav-link active" href="formulario.html">Formulario</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <h1>Usuarios Registrados</h1>
    <form id="userForm" novalidate>
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre *</label>
        <input type="text" class="form-control" id="nombre" name="nombre" required>
        <div class="invalid-feedback">El nombre es obligatorio.</div>
      </div>

      <div class="mb-3">
        <label for="usuario" class="form-label">Usuario *</label>
        <input type="text" class="form-control" id="usuario" name="usuario" required>
        <div class="invalid-feedback">El usuario es obligatorio.</div>
      </div>

      <div class="mb-3">
        <label for="fecha" class="form-label">Fecha Ingreso (dd/mm/yyyy) *</label>
        <input type="date" class="form-control" id="fecha" name="fecha" required>
        <div class="invalid-feedback">Ingrese una fecha válida en formato dd/mm/yyyy.</div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email *</label>
        <input type="email" class="form-control" id="email" name="email" required>
        <div class="invalid-feedback">Ingrese un correo válido (usuario@servidor.dom).</div>
      </div>

      <div class="mb-3">
        <label for="website" class="form-label">Sitio Web</label>
        <input type="url" class="form-control" id="website" name="website">
        <div class="invalid-feedback">Ingrese una URL válida.</div>
      </div>

      <button type="button" id="cancelBtn" class="btn btn-secondary">Cancelar</button>
      <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
